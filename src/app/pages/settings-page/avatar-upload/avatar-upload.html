<img [src]="preview()" alt="avatar-placeholder" class="avatar">
<div
  dnd
  class="dropzone"
  tabindex="0"
  (keyup.enter)="fileDrop.click()"
  (fileDropped)="onFileDropped($event)"
>
  <div class="dropzone-content">
    <app-svg-icon
        icon="upload"
        [size]="18"
        class="upload-icon"
      ></app-svg-icon>
    <span class="medium-text">
      Перетащите изображение или Загрузите
    </span>
  </div>
  <input
    tabindex="-1"
    class="avatar-input"
    type="file"
    #fileDrop
    (change)="fileBrowserHandler($event)"
  >
</div>
